version: "3.9"

services:
  db:
    image: postgres:15
    container_name: flowlm_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postflowpd
      POSTGRES_DB: flowlm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:   # ✅ ADD THIS (don’t replace anything)
    image: redis:7
    container_name: flowlm_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: